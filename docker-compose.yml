services:
  arbiter:
    build: .
    ports:
      - "8080:8080"
    environment:
      ARBITER_DB_URL: postgres://arbiter:arbiter@postgres:5432/arbiter?sslmode=disable
      ARBITER_REDIS_URL: redis://redis:6379
      ARBITER_LOG_LEVEL: info
      ARBITER_WEBHOOK_SECRET: ${ARBITER_WEBHOOK_SECRET}
      ARBITER_GITHUB_APP_ID: ${ARBITER_GITHUB_APP_ID}
      ARBITER_GITHUB_PRIVATE_KEY_PATH: /app/private-key.pem
    volumes:
      - ${ARBITER_GITHUB_PRIVATE_KEY_PATH:-./private-key.pem}:/app/private-key.pem:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: arbiter
      POSTGRES_PASSWORD: arbiter
      POSTGRES_DB: arbiter
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arbiter"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
